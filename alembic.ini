[alembic]
script_location = src/finance_app/db/migrations
prepend_sys_path = .
[loggers]
keys = root,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic
level = NOTSET
[formatter_generic]
format = %(levelname)s [%(name)s] %(message)s
